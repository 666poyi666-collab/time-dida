<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>风格二 · 曦光 Light Bloom</title>
    <style>
      @font-face {
        font-family: 'Geist';
        src: url('../mock-v2/fonts/geist-latin-wght-normal.woff2') format('woff2');
        font-weight: 100 900;
      }
      @font-face {
        font-family: 'JetBrains Mono';
        src: url('../mock-v2/fonts/jetbrains-mono-latin-400-normal.woff2') format('woff2');
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; height: 100%; overflow: hidden; }

      body {
        display: flex;
        color: #171a26;
        background: #f7f6fb;
        font-family: 'Geist', 'Microsoft YaHei UI', sans-serif;
        user-select: none;
        -webkit-font-smoothing: antialiased;
      }

      /* ── 曦光花田：桃/鸢尾/天青/薄荷四色可见光斑，缓慢漂移 ── */
      .blooms { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
      .blooms i { position: absolute; display: block; border-radius: 50%; will-change: transform; }
      .blooms .p1 {
        top: -26%; left: -8%;
        width: 62vw; height: 62vw;
        background: radial-gradient(circle, rgb(255 159 122 / 0.4), transparent 62%);
        filter: blur(46px);
        animation: bl-a 22s ease-in-out infinite alternate;
      }
      .blooms .p2 {
        top: -18%; right: -14%;
        width: 58vw; height: 58vw;
        background: radial-gradient(circle, rgb(99 102 241 / 0.3), transparent 64%);
        filter: blur(52px);
        animation: bl-b 27s ease-in-out infinite alternate;
      }
      .blooms .p3 {
        bottom: -34%; left: 16%;
        width: 60vw; height: 60vw;
        background: radial-gradient(circle, rgb(56 189 248 / 0.28), transparent 66%);
        filter: blur(50px);
        animation: bl-c 25s ease-in-out infinite alternate;
      }
      .blooms .p4 {
        bottom: -20%; right: 6%;
        width: 44vw; height: 44vw;
        background: radial-gradient(circle, rgb(52 211 153 / 0.24), transparent 66%);
        filter: blur(54px);
        animation: bl-a 31s ease-in-out infinite alternate-reverse;
      }
      @keyframes bl-a { to { transform: translate3d(6%, 7%, 0) scale(1.1); } }
      @keyframes bl-b { to { transform: translate3d(-7%, 6%, 0) scale(1.06); } }
      @keyframes bl-c { to { transform: translate3d(5%, -6%, 0) scale(1.12); } }

      /* ── 流光轨道 ── */
      .rail {
        position: relative; z-index: 10;
        display: flex; flex-direction: column; align-items: center;
        width: 76px; flex: 0 0 76px;
        padding: 18px 0 16px;
        border-right: 1px solid rgb(255 255 255 / 0.65);
        background: linear-gradient(180deg, rgb(255 255 255 / 0.62), rgb(255 255 255 / 0.28));
        box-shadow: 1px 0 24px -12px rgb(99 102 241 / 0.18);
      }
      .brand {
        width: 36px; height: 36px; border-radius: 12px;
        background: linear-gradient(140deg, #8b7bff, #38bdf8);
        box-shadow: 0 8px 20px -6px rgb(99 102 241 / 0.55), inset 0 1px 0 rgb(255 255 255 / 0.4);
      }
      .nav { display: flex; flex-direction: column; gap: 8px; margin-top: 34px; }
      .nav button {
        display: flex; flex-direction: column; align-items: center; gap: 4px;
        width: 52px; padding: 9px 0 8px;
        border: 0; border-radius: 16px;
        color: #8a8fa8;
        background: transparent;
        font: 560 10px 'Geist', 'Microsoft YaHei UI', sans-serif;
        letter-spacing: 0.02em;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .nav button:hover { color: #3c4160; transform: translateY(-1px); }
      .nav button.active {
        color: #4f46e5;
        background: rgb(255 255 255 / 0.85);
        box-shadow:
          0 10px 24px -10px rgb(99 102 241 / 0.4),
          0 0 0 1px rgb(99 102 241 / 0.14);
        transform: translateY(-1px);
      }
      .state-dot {
        margin-top: auto;
        display: flex; flex-direction: column; align-items: center; gap: 5px;
        padding: 9px 8px;
        border-radius: 14px;
        color: #0c8a5b;
        background: rgb(255 255 255 / 0.7);
        box-shadow: 0 6px 18px -8px rgb(16 185 129 / 0.45), 0 0 0 1px rgb(16 185 129 / 0.16);
        font: 560 10px 'Geist', 'Microsoft YaHei UI', sans-serif;
      }
      .state-dot i {
        width: 7px; height: 7px; border-radius: 50%;
        background: #10b981;
        box-shadow: 0 0 10px rgb(16 185 129 / 0.8);
        animation: pulse 2.2s ease-in-out infinite;
      }
      .state-dot time { font-variant-numeric: tabular-nums; }
      @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.35); opacity: 0.6; } }

      /* ── 主区 ── */
      .stage {
        position: relative; z-index: 5;
        flex: 1; display: flex; flex-direction: column;
        min-width: 0;
      }
      .topbar {
        display: flex; align-items: center; justify-content: space-between;
        padding: 26px 40px 0 48px;
      }
      .eyebrow {
        font: 400 11px 'JetBrains Mono', monospace;
        letter-spacing: 0.2em;
        color: #8a8fa8;
      }
      .eyebrow em { color: #0c8a5b; font-style: normal; }
      .task {
        display: inline-flex; align-items: center; gap: 8px;
        padding: 8px 15px;
        border-radius: 999px;
        color: #5a6076;
        background: rgb(255 255 255 / 0.72);
        box-shadow: 0 8px 22px -12px rgb(60 66 120 / 0.25), 0 0 0 1px rgb(255 255 255 / 0.8);
        font-size: 12px;
      }
      .task b { color: #4f46e5; font-weight: 600; cursor: pointer; }

      .hero {
        flex: 1;
        display: flex; flex-direction: column; justify-content: center;
        padding: 0 48px;
      }
      .digits {
        width: max-content;
        font-size: 196px;
        font-weight: 640;
        letter-spacing: -0.045em;
        line-height: 0.92;
        font-variant-numeric: tabular-nums;
        background: linear-gradient(100deg, #4338ca 8%, #7c3aed 38%, #2563eb 66%, #0ea5e9 92%);
        background-size: 220% 100%;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: ink-slide 11s ease-in-out infinite alternate;
      }
      @keyframes ink-slide {
        from { background-position: 0% 0; }
        to { background-position: 100% 0; }
      }
      .digits.tick { animation: tick-flip 0.22s cubic-bezier(0.2, 0.8, 0.2, 1), ink-slide 11s ease-in-out infinite alternate; }
      @keyframes tick-flip {
        0% { transform: translateY(2px); opacity: 0.7; }
        100% { transform: translateY(0); opacity: 1; }
      }
      .meta {
        margin-top: 10px;
        font: 400 12px 'JetBrains Mono', monospace;
        letter-spacing: 0.08em;
        color: #8a8fa8;
      }
      .meta em { color: #0c8a5b; font-style: normal; }

      .track {
        position: relative;
        width: min(560px, 80%);
        height: 5px;
        margin-top: 30px;
        border-radius: 99px;
        background: rgb(23 26 38 / 0.07);
        overflow: hidden;
      }
      .track::before {
        content: '';
        position: absolute; inset: 0 auto 0 0;
        width: 58%;
        border-radius: inherit;
        background: linear-gradient(90deg, #6366f1, #38bdf8);
        box-shadow: 0 2px 14px rgb(99 102 241 / 0.5);
      }
      .track::after {
        content: '';
        position: absolute; top: 0; bottom: 0; left: -26%;
        width: 26%;
        background: linear-gradient(90deg, transparent, rgb(255 255 255 / 0.8), transparent);
        animation: sheen 3.1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }
      @keyframes sheen { to { left: 112%; } }

      /* ── 底部果冻命令条 ── */
      .dock {
        display: flex; justify-content: center;
        padding: 0 40px 32px;
      }
      .cmd {
        display: flex; align-items: center; gap: 12px;
        padding: 11px 13px;
        border-radius: 22px;
        background: rgb(255 255 255 / 0.78);
        box-shadow:
          0 24px 55px -22px rgb(60 66 120 / 0.35),
          0 0 0 1px rgb(255 255 255 / 0.85);
        animation: dock-in 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.15s backwards;
      }
      @keyframes dock-in {
        from { transform: translateY(24px) scale(0.96); opacity: 0; }
        to { transform: translateY(0) scale(1); opacity: 1; }
      }
      .btn-pause {
        position: relative;
        display: inline-flex; align-items: center; gap: 9px;
        min-height: 48px; padding: 0 26px;
        border: 0; border-radius: 15px;
        color: #fff;
        background: linear-gradient(150deg, #ff6a5e, #e0283a 70%);
        box-shadow:
          0 12px 26px -8px rgb(224 49 60 / 0.55),
          0 0 40px -10px rgb(255 106 94 / 0.55),
          inset 0 1px 0 rgb(255 255 255 / 0.32);
        font: 600 13.5px 'Geist', 'Microsoft YaHei UI', sans-serif;
        letter-spacing: 0.02em;
        cursor: pointer;
        overflow: hidden;
        transition: transform 0.4s cubic-bezier(0.34, 1.8, 0.64, 1), box-shadow 0.3s;
      }
      .btn-pause:hover { transform: scale(1.06, 1.02) translateY(-1px); }
      .btn-pause:active { transform: scale(0.92, 0.96); }
      .btn-pause::after {
        content: '';
        position: absolute; top: 0; bottom: 0; left: -40%;
        width: 40%;
        background: linear-gradient(100deg, transparent, rgb(255 255 255 / 0.4), transparent);
        animation: sheen 2.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }
      .btn-ghost {
        min-height: 48px; padding: 0 18px;
        border: 0; border-radius: 15px;
        color: #8a8fa8;
        background: rgb(23 26 38 / 0.05);
        font: 550 12.5px 'Geist', 'Microsoft YaHei UI', sans-serif;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .btn-ghost:hover { color: #3c4160; background: rgb(23 26 38 / 0.09); transform: translateY(-1px); }
      .cmd .divider { width: 1px; height: 22px; background: rgb(23 26 38 / 0.1); }
      .cmd .stats {
        padding: 0 10px;
        font: 400 11px 'JetBrains Mono', monospace;
        color: #8a8fa8;
        font-variant-numeric: tabular-nums;
      }
      .cmd .stats b { color: #171a26; font-weight: 500; }
    </style>
  </head>
  <body>
    <div class="blooms"><i class="p1"></i><i class="p2"></i><i class="p3"></i><i class="p4"></i></div>

    <aside class="rail">
      <span class="brand"></span>
      <nav class="nav">
        <button class="active">
          <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><circle cx="12" cy="12" r="8.2"/><circle cx="12" cy="12" r="3.4"/></svg>
          专注
        </button>
        <button>
          <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 6h10M9.5 12h10M9.5 18h10"/><path d="M4 6.2l1.3 1.3L7.6 5.2M4 12.2l1.3 1.3 2.3-2.3M4 18.2l1.3 1.3 2.3-2.3"/></svg>
          任务
        </button>
        <button>
          <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><path d="M6 19v-6M11 19V6M16 19v-3M21 19v-9"/></svg>
          统计
        </button>
        <button>
          <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><path d="M4.5 8h8M18.5 8h1M4.5 16h3M13.5 16h6"/><circle cx="15.5" cy="8" r="2.1"/><circle cx="10.5" cy="16" r="2.1"/></svg>
          设置
        </button>
      </nav>
      <div class="state-dot"><i></i>专注中<time>12:47</time></div>
    </aside>

    <main class="stage">
      <header class="topbar">
        <span class="eyebrow">FOCUS · 01 — <em>REC</em></span>
        <span class="task">当前任务 · 未选择任务&ensp;<b>关联</b></span>
      </header>

      <section class="hero">
        <div class="digits" data-t>12:47</div>
        <div class="meta">开始于 <em>11:26</em> · 已持续 12 分 47 秒</div>
        <div class="track"></div>
      </section>

      <footer class="dock">
        <div class="cmd">
          <button class="btn-pause">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor"><path d="M8 5h3v14H8zM13.5 5H17v14h-3.5z"/></svg>
            暂停专注
          </button>
          <button class="btn-ghost">结束</button>
          <span class="divider"></span>
          <span class="stats">累计 <b>2:41:18</b> · 暂停 <b>0:18</b> · 总历时 <b>3:05:02</b></span>
        </div>
      </footer>
    </main>

    <script>
      let s = 12 * 60 + 47;
      const el = document.querySelector('[data-t]');
      setInterval(() => {
        s++;
        const m = String(Math.floor(s / 60)).padStart(2, '0');
        const ss = String(s % 60).padStart(2, '0');
        el.textContent = `${m}:${ss}`;
        el.classList.remove('tick');
        void el.offsetWidth;
        el.classList.add('tick');
      }, 1000);
    </script>
  </body>
</html>
