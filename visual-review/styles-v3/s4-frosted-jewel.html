<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>风格四 · 凝脂 Frosted Jewel</title>
    <style>
      @font-face {
        font-family: 'Geist';
        src: url('../mock-v2/fonts/geist-latin-wght-normal.woff2') format('woff2');
        font-weight: 100 900;
      }
      @font-face {
        font-family: 'JetBrains Mono';
        src: url('../mock-v2/fonts/jetbrains-mono-latin-400-normal.woff2') format('woff2');
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; height: 100%; overflow: hidden; }

      body {
        position: relative;
        display: flex; flex-direction: column;
        color: #20243a;
        font-family: 'Geist', 'Microsoft YaHei UI', sans-serif;
        user-select: none;
        -webkit-font-smoothing: antialiased;
        background:
          radial-gradient(90% 70% at 12% 0%, rgb(255 183 213 / 0.85), transparent 62%),
          radial-gradient(80% 60% at 92% 12%, rgb(139 122 255 / 0.7), transparent 60%),
          radial-gradient(90% 70% at 78% 96%, rgb(112 197 255 / 0.8), transparent 64%),
          radial-gradient(70% 60% at 8% 92%, rgb(255 214 165 / 0.75), transparent 60%),
          linear-gradient(150deg, #f6ecff, #e8f1ff 52%, #ffeef5);
        background-color: #efeaff;
      }

      .wallpaper {
        position: absolute; inset: -6%;
        background:
          radial-gradient(46% 40% at 30% 30%, rgb(255 255 255 / 0.5), transparent 70%),
          radial-gradient(40% 36% at 68% 62%, rgb(255 255 255 / 0.35), transparent 70%);
        animation: wall-pan 36s ease-in-out infinite alternate;
        pointer-events: none;
      }
      @keyframes wall-pan {
        from { transform: translate3d(-1.5%, -1%, 0) scale(1); }
        to { transform: translate3d(1.5%, 1.5%, 0) scale(1.04); }
      }

      /* ── 顶部悬浮岛导航 ── */
      .island {
        position: relative; z-index: 10;
        align-self: center;
        display: flex; align-items: center; gap: 4px;
        margin-top: 18px;
        padding: 6px;
        border-radius: 999px;
        background: rgb(255 255 255 / 0.58);
        box-shadow:
          0 18px 44px -16px rgb(90 74 172 / 0.4),
          inset 0 1px 0 rgb(255 255 255 / 0.9),
          inset 0 0 0 1px rgb(255 255 255 / 0.55);
        animation: bob 7s ease-in-out infinite;
      }
      .island .logo {
        width: 32px; height: 32px; margin: 0 6px 0 4px;
        border-radius: 11px;
        background: linear-gradient(140deg, #8b7bff, #38bdf8);
        box-shadow: 0 6px 16px -4px rgb(99 102 241 / 0.6), inset 0 1px 0 rgb(255 255 255 / 0.4);
      }
      .island button {
        display: flex; align-items: center; gap: 6px;
        min-height: 34px; padding: 0 14px;
        border: 0; border-radius: 999px;
        color: #6b7089;
        background: transparent;
        font: 550 12px 'Geist', 'Microsoft YaHei UI', sans-serif;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .island button:hover { color: #20243a; transform: translateY(-1px); }
      .island button.active {
        color: #4338ca;
        background: rgb(255 255 255 / 0.92);
        box-shadow: 0 6px 16px -6px rgb(90 74 172 / 0.4), inset 0 0 0 1px rgb(255 255 255);
      }
      .island .state {
        display: flex; align-items: center; gap: 6px;
        margin-left: 4px; margin-right: 4px;
        padding: 7px 12px;
        border-radius: 999px;
        color: #047857;
        background: rgb(209 250 229 / 0.85);
        box-shadow: inset 0 0 0 1px rgb(16 185 129 / 0.25);
        font: 560 11px 'Geist', 'Microsoft YaHei UI', sans-serif;
        font-variant-numeric: tabular-nums;
      }
      .island .state i {
        width: 6px; height: 6px; border-radius: 50%;
        background: #10b981;
        box-shadow: 0 0 8px rgb(16 185 129 / 0.8);
        animation: pulse 2.2s ease-in-out infinite;
      }
      @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.4); opacity: 0.55; } }
      @keyframes bob {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(3px); }
      }

      /* ── 中央凝脂主卡 ── */
      .center {
        position: relative; z-index: 5;
        flex: 1;
        display: flex; align-items: center; justify-content: center;
      }
      .slab-wrap { position: relative; }
      .slab-wrap::before {
        /* 虹彩描边（锥形渐变慢转） */
        content: '';
        position: absolute; inset: -1.5px;
        border-radius: 34px;
        background: conic-gradient(
          from var(--ring, 0deg),
          rgb(255 255 255 / 0.9),
          rgb(139 122 255 / 0.65),
          rgb(112 197 255 / 0.6),
          rgb(255 183 213 / 0.65),
          rgb(255 255 255 / 0.9)
        );
        animation: ring-spin 9s linear infinite;
        z-index: 0;
      }
      @property --ring { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
      @keyframes ring-spin { to { --ring: 360deg; } }
      .slab {
        position: relative; z-index: 1;
        display: flex; flex-direction: column; align-items: center;
        padding: 44px 72px 36px;
        border-radius: 32px;
        background: rgb(255 255 255 / 0.6);
        box-shadow:
          0 40px 90px -30px rgb(90 74 172 / 0.5),
          inset 0 1px 0 rgb(255 255 255 / 0.95);
        animation: bob 8s ease-in-out infinite reverse;
      }
      .eyebrow {
        font: 400 10.5px 'JetBrains Mono', monospace;
        letter-spacing: 0.22em;
        color: #8a7fb8;
      }
      .digits {
        margin-top: 6px;
        font-size: 168px;
        font-weight: 660;
        letter-spacing: -0.045em;
        line-height: 0.94;
        color: #1b1f33;
        font-variant-numeric: tabular-nums;
      }
      .digits.tick { animation: tick-flip 0.2s cubic-bezier(0.2, 0.8, 0.2, 1); }
      @keyframes tick-flip {
        0% { transform: translateY(2px) scale(0.998); opacity: 0.72; }
        100% { transform: translateY(0) scale(1); opacity: 1; }
      }
      .meta {
        margin-top: 6px;
        font: 400 12px 'JetBrains Mono', monospace;
        letter-spacing: 0.08em;
        color: #8a87a8;
      }
      .meta em { color: #047857; font-style: normal; }

      .controls { display: flex; align-items: center; gap: 12px; margin-top: 26px; }
      .btn-pause {
        position: relative;
        display: inline-flex; align-items: center; gap: 9px;
        min-height: 50px; padding: 0 28px;
        border: 0; border-radius: 999px;
        color: #fff;
        background: linear-gradient(150deg, #fb5e6e, #d61f2f 74%);
        box-shadow:
          0 14px 30px -8px rgb(225 29 72 / 0.55),
          0 0 44px -10px rgb(251 94 110 / 0.5),
          inset 0 1.5px 0 rgb(255 255 255 / 0.4),
          inset 0 -2px 6px rgb(160 10 30 / 0.25);
        font: 600 14px 'Geist', 'Microsoft YaHei UI', sans-serif;
        letter-spacing: 0.02em;
        cursor: pointer;
        transition: transform 0.4s cubic-bezier(0.34, 1.8, 0.64, 1);
      }
      .btn-pause:hover { transform: scale(1.06) translateY(-1px); }
      .btn-pause:active { transform: scale(0.93); }
      .btn-ghost {
        min-height: 50px; padding: 0 18px;
        border: 0; border-radius: 999px;
        color: #6b7089;
        background: rgb(255 255 255 / 0.65);
        box-shadow: inset 0 0 0 1px rgb(255 255 255 / 0.8), 0 6px 16px -8px rgb(90 74 172 / 0.3);
        font: 550 12.5px 'Geist', 'Microsoft YaHei UI', sans-serif;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .btn-ghost:hover { color: #20243a; transform: translateY(-1px); }

      .slab .stats {
        display: flex; gap: 22px;
        margin-top: 24px; padding-top: 16px;
        border-top: 1px solid rgb(90 74 172 / 0.12);
        font: 400 11px 'JetBrains Mono', monospace;
        color: #8a87a8;
        font-variant-numeric: tabular-nums;
      }
      .slab .stats b { color: #20243a; font-weight: 500; }

      /* ── 右下迷你账本卡 ── */
      .mini-ledger {
        position: absolute; z-index: 6;
        right: 26px; bottom: 24px;
        width: 252px;
        padding: 14px 16px;
        border-radius: 20px;
        background: rgb(255 255 255 / 0.55);
        box-shadow:
          0 24px 55px -22px rgb(90 74 172 / 0.45),
          inset 0 0 0 1px rgb(255 255 255 / 0.6);
        animation: bob 9s ease-in-out infinite;
      }
      .mini-ledger h5 {
        font: 400 10px 'JetBrains Mono', monospace;
        letter-spacing: 0.16em;
        color: #8a7fb8;
        margin-bottom: 8px;
      }
      .mini-ledger .row {
        display: flex; align-items: center; gap: 8px;
        padding: 6px 0;
        font-size: 11.5px;
        color: #3c4160;
      }
      .mini-ledger .row i { width: 7px; height: 7px; border-radius: 50%; background: #10b981; box-shadow: 0 0 8px rgb(16 185 129 / 0.7); }
      .mini-ledger .row.pause i { background: #e11d48; box-shadow: 0 0 8px rgb(225 29 72 / 0.7); }
      .mini-ledger .row span { flex: 1; color: #6b7089; }
      .mini-ledger .row b { font-weight: 560; font-variant-numeric: tabular-nums; }
      .mini-ledger .row.pause b { color: #e11d48; }

      .task-fab {
        position: absolute; z-index: 6;
        left: 26px; bottom: 24px;
        display: flex; align-items: center; gap: 8px;
        padding: 11px 16px;
        border: 0; border-radius: 999px;
        color: #3c4160;
        background: rgb(255 255 255 / 0.6);
        box-shadow:
          0 18px 40px -18px rgb(90 74 172 / 0.45),
          inset 0 0 0 1px rgb(255 255 255 / 0.65);
        font: 550 12px 'Geist', 'Microsoft YaHei UI', sans-serif;
        cursor: pointer;
        animation: bob 7.5s ease-in-out infinite 0.4s;
      }
      .task-fab b { color: #4338ca; font-weight: 600; }
    </style>
  </head>
  <body>
    <div class="wallpaper"></div>

    <nav class="island">
      <span class="logo"></span>
      <button class="active">专注</button>
      <button>任务</button>
      <button>统计</button>
      <button>设置</button>
      <span class="state"><i></i>专注中 12:47</span>
    </nav>

    <main class="center">
      <div class="slab-wrap">
        <section class="slab">
          <span class="eyebrow">FOCUS · 01</span>
          <div class="digits" data-t>12:47</div>
          <div class="meta">开始于 <em>11:26</em> · 正在记录专注</div>
          <div class="controls">
            <button class="btn-pause">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor"><path d="M8 5h3v14H8zM13.5 5H17v14h-3.5z"/></svg>
              暂停专注
            </button>
            <button class="btn-ghost">结束</button>
          </div>
          <div class="stats">
            <span>累计 <b>2:41:18</b></span>
            <span>暂停 <b style="color: #e11d48">0:18:44</b></span>
            <span>总历时 <b>3:05:02</b></span>
          </div>
        </section>
      </div>
    </main>

    <button class="task-fab">当前任务 · 未选择任务&ensp;<b>关联</b></button>

    <aside class="mini-ledger">
      <h5>本次片段 · 2</h5>
      <div class="row"><i></i><span>专注片段 1 · 进行中</span><b>12:47</b></div>
      <div class="row pause"><i></i><span>暂停片段 1 · 11:39—11:41</span><b>1:32</b></div>
    </aside>

    <script>
      let s = 12 * 60 + 47;
      const el = document.querySelector('[data-t]');
      setInterval(() => {
        s++;
        const m = String(Math.floor(s / 60)).padStart(2, '0');
        const ss = String(s % 60).padStart(2, '0');
        el.textContent = `${m}:${ss}`;
        el.classList.remove('tick');
        void el.offsetWidth;
        el.classList.add('tick');
      }, 1000);
    </script>
  </body>
</html>
