<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>风格一 · 极光 Aurora</title>
    <style>
      @font-face {
        font-family: 'Geist';
        src: url('../mock-v2/fonts/geist-latin-wght-normal.woff2') format('woff2');
        font-weight: 100 900;
      }
      @font-face {
        font-family: 'JetBrains Mono';
        src: url('../mock-v2/fonts/jetbrains-mono-latin-400-normal.woff2') format('woff2');
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; height: 100%; overflow: hidden; }

      body {
        position: relative;
        color: #eef2ff;
        background: #060913;
        font-family: 'Geist', 'Microsoft YaHei UI', sans-serif;
        user-select: none;
        -webkit-font-smoothing: antialiased;
      }

      /* ── 极光天幕：四层流动光 + 慢速色相流转 ── */
      .sky { position: absolute; inset: 0; overflow: hidden; }
      .sky i {
        position: absolute;
        display: block;
        border-radius: 50%;
        mix-blend-mode: screen;
        will-change: transform, filter;
      }
      .sky .a1 {
        top: -30%; left: -12%;
        width: 85vw; height: 85vw;
        background: radial-gradient(circle, rgb(124 92 255 / 0.34), transparent 62%);
        filter: blur(56px);
        animation: drift-a 46s ease-in-out infinite alternate;
      }
      .sky .a2 {
        right: -26%; top: -10%;
        width: 70vw; height: 70vw;
        background: radial-gradient(circle, rgb(34 211 238 / 0.26), transparent 64%);
        filter: blur(64px);
        animation: drift-b 58s ease-in-out infinite alternate;
      }
      .sky .a3 {
        left: 8%; bottom: -46%;
        width: 76vw; height: 76vw;
        background: radial-gradient(circle, rgb(52 211 153 / 0.2), transparent 66%);
        filter: blur(60px);
        animation: drift-c 52s ease-in-out infinite alternate;
      }
      .sky .a4 {
        right: 4%; bottom: -30%;
        width: 52vw; height: 52vw;
        background: radial-gradient(circle, rgb(232 121 249 / 0.17), transparent 66%);
        filter: blur(70px);
        animation: drift-a 64s ease-in-out infinite alternate-reverse;
      }
      .sky .hue {
        inset: 0;
        border-radius: 0;
        mix-blend-mode: overlay;
        background: linear-gradient(120deg, rgb(124 92 255 / 0.1), rgb(34 211 238 / 0.06) 50%, rgb(232 121 249 / 0.08));
        animation: hue-flow 38s linear infinite;
      }
      @keyframes drift-a { to { transform: translate3d(9%, 8%, 0) scale(1.14); } }
      @keyframes drift-b { to { transform: translate3d(-8%, 10%, 0) scale(0.94); } }
      @keyframes drift-c { to { transform: translate3d(7%, -9%, 0) scale(1.1); } }
      @keyframes hue-flow {
        0%, 100% { filter: hue-rotate(0deg); opacity: 0.8; }
        50% { filter: hue-rotate(38deg); opacity: 1; }
      }

      /* ── 星尘 ── */
      .stars i {
        position: absolute;
        width: 3px; height: 3px;
        border-radius: 50%;
        background: rgb(190 210 255 / 0.7);
        box-shadow: 0 0 8px rgb(140 170 255 / 0.8);
        animation: star 26s linear infinite;
        opacity: 0;
      }
      .stars i:nth-child(1) { top: 22%; left: 18%; animation-delay: 0s; }
      .stars i:nth-child(2) { top: 64%; left: 74%; animation-delay: -6s; }
      .stars i:nth-child(3) { top: 38%; left: 58%; animation-delay: -12s; width: 2px; height: 2px; }
      .stars i:nth-child(4) { top: 78%; left: 30%; animation-delay: -18s; }
      .stars i:nth-child(5) { top: 14%; left: 82%; animation-delay: -22s; width: 2px; height: 2px; }
      @keyframes star {
        0% { transform: translate3d(0, 0, 0); opacity: 0; }
        12% { opacity: 0.9; }
        60% { opacity: 0.5; }
        100% { transform: translate3d(4vw, -6vh, 0); opacity: 0; }
      }

      /* ── 顶栏：极简玻璃 ── */
      .topbar {
        position: relative; z-index: 5;
        display: flex; align-items: center; justify-content: space-between;
        padding: 22px 30px 0;
      }
      .brandline { display: flex; align-items: center; gap: 10px; }
      .brand-dot {
        width: 26px; height: 26px; border-radius: 9px;
        background: linear-gradient(140deg, #8b7bff, #22d3ee);
        box-shadow: 0 0 18px rgb(124 92 255 / 0.55), inset 0 1px 0 rgb(255 255 255 / 0.35);
      }
      .brandline span { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; color: #cdd7f5; }
      .topnav { display: flex; gap: 6px; }
      .topnav button {
        border: 1px solid rgb(255 255 255 / 0.09);
        border-radius: 999px;
        padding: 7px 14px;
        color: #93a1c8;
        background: rgb(255 255 255 / 0.04);
        font: 500 11.5px 'Geist', 'Microsoft YaHei UI', sans-serif;
        letter-spacing: 0.04em;
        cursor: pointer;
        transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .topnav button:hover { color: #fff; border-color: rgb(255 255 255 / 0.2); transform: translateY(-1px); }
      .topnav button.active {
        color: #fff;
        border-color: rgb(139 123 255 / 0.5);
        background: linear-gradient(180deg, rgb(139 123 255 / 0.22), rgb(139 123 255 / 0.08));
        box-shadow: 0 0 20px -4px rgb(124 92 255 / 0.55), inset 0 1px 0 rgb(255 255 255 / 0.12);
      }

      /* ── 中央舞台 ── */
      .stage {
        position: relative; z-index: 4;
        height: calc(100% - 70px);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        padding-bottom: 96px;
      }
      .task-pill {
        display: inline-flex; align-items: center; gap: 8px;
        margin-bottom: 34px;
        padding: 8px 16px;
        border: 1px solid rgb(255 255 255 / 0.1);
        border-radius: 999px;
        color: #aebadd;
        background: rgb(10 14 28 / 0.55);
        box-shadow: 0 10px 30px -14px rgb(0 0 0 / 0.7), inset 0 1px 0 rgb(255 255 255 / 0.06);
        font-size: 12px;
      }
      .task-pill b { color: #8b7bff; font-weight: 600; cursor: pointer; }
      .rec {
        display: inline-flex; align-items: center; gap: 9px;
        font: 400 11px 'JetBrains Mono', monospace;
        letter-spacing: 0.22em;
        color: #7f8cb3;
      }
      .rec i {
        width: 7px; height: 7px; border-radius: 50%;
        background: #34d399;
        box-shadow: 0 0 12px #34d399;
        animation: blink 2.4s ease-in-out infinite;
      }
      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

      .digits-wrap { position: relative; margin-top: 14px; }
      .digits {
        position: relative;
        font-size: 208px;
        font-weight: 480;
        letter-spacing: -0.045em;
        line-height: 0.92;
        font-variant-numeric: tabular-nums;
        background: linear-gradient(178deg, #ffffff 18%, #c9c2ff 58%, #7f8fe8 92%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .digits-glow {
        position: absolute; inset: 0; z-index: -1;
        font-size: 208px;
        font-weight: 480;
        letter-spacing: -0.045em;
        line-height: 0.92;
        font-variant-numeric: tabular-nums;
        color: rgb(124 110 255 / 0.55);
        filter: blur(34px);
        animation: glow-breathe 5.5s ease-in-out infinite;
      }
      @keyframes glow-breathe {
        0%, 100% { opacity: 0.45; transform: scale(0.985); }
        50% { opacity: 0.85; transform: scale(1.02); }
      }
      .digits.tick { animation: tick-flip 0.22s cubic-bezier(0.2, 0.8, 0.2, 1); }
      @keyframes tick-flip {
        0% { transform: translateY(1.5px); filter: blur(1px); opacity: 0.75; }
        100% { transform: translateY(0); filter: blur(0); opacity: 1; }
      }

      .meta {
        margin-top: 12px;
        font: 400 12px 'JetBrains Mono', monospace;
        letter-spacing: 0.1em;
        color: #7f8cb3;
      }
      .meta em { color: #34d399; font-style: normal; }

      .track {
        position: relative;
        width: 460px; height: 3px;
        margin-top: 30px;
        border-radius: 99px;
        background: rgb(255 255 255 / 0.1);
        overflow: hidden;
      }
      .track::before {
        content: '';
        position: absolute; inset: 0 auto 0 0;
        width: 58%;
        border-radius: inherit;
        background: linear-gradient(90deg, #34d399, #22d3ee);
        box-shadow: 0 0 16px rgb(52 211 153 / 0.6);
      }
      .track::after {
        content: '';
        position: absolute; top: 0; bottom: 0; left: -30%;
        width: 30%;
        background: linear-gradient(90deg, transparent, rgb(255 255 255 / 0.55), transparent);
        animation: sheen 3.4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }
      @keyframes sheen { to { left: 110%; } }

      /* ── 底部 Dock ── */
      .dock {
        position: absolute; z-index: 6;
        left: 50%; bottom: 30px;
        display: flex; align-items: center; gap: 12px;
        padding: 12px 14px;
        border: 1px solid rgb(255 255 255 / 0.1);
        border-radius: 26px;
        background: rgb(12 17 32 / 0.72);
        box-shadow:
          0 30px 70px -24px rgb(0 0 0 / 0.85),
          0 0 40px -12px rgb(124 92 255 / 0.35),
          inset 0 1px 0 rgb(255 255 255 / 0.07);
        transform: translateX(-50%);
        animation: dock-in 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.2s backwards;
      }
      @keyframes dock-in {
        from { transform: translate(-50%, 26px); opacity: 0; }
        to { transform: translate(-50%, 0); opacity: 1; }
      }
      .btn-pause {
        position: relative;
        display: inline-flex; align-items: center; gap: 9px;
        min-height: 50px; padding: 0 26px;
        border: 0; border-radius: 17px;
        color: #fff;
        background: linear-gradient(150deg, #ff5a66, #d61f2f 72%);
        box-shadow:
          0 10px 26px -8px rgb(224 49 60 / 0.65),
          0 0 44px -8px rgb(224 49 60 / 0.5),
          inset 0 1px 0 rgb(255 255 255 / 0.28);
        font: 600 14px 'Geist', 'Microsoft YaHei UI', sans-serif;
        letter-spacing: 0.02em;
        cursor: pointer;
        overflow: hidden;
        transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.35s;
      }
      .btn-pause:hover { transform: scale(1.045); }
      .btn-pause:active { transform: scale(0.94); }
      .btn-pause::after {
        content: '';
        position: absolute; top: 0; bottom: 0; left: -40%;
        width: 40%;
        background: linear-gradient(100deg, transparent, rgb(255 255 255 / 0.35), transparent);
        animation: sheen 3s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }
      .btn-ghost {
        min-height: 50px; padding: 0 18px;
        border: 1px solid rgb(255 255 255 / 0.12);
        border-radius: 17px;
        color: #aebadd;
        background: transparent;
        font: 500 12.5px 'Geist', 'Microsoft YaHei UI', sans-serif;
        cursor: pointer;
        transition: all 0.25s;
      }
      .btn-ghost:hover { color: #fff; border-color: rgb(255 255 255 / 0.24); }
      .dock .divider { width: 1px; height: 24px; background: rgb(255 255 255 / 0.1); }
      .dock .stats {
        padding: 0 10px;
        font: 400 11px 'JetBrains Mono', monospace;
        letter-spacing: 0.04em;
        color: #7f8cb3;
        font-variant-numeric: tabular-nums;
      }
      .dock .stats b { color: #d7def5; font-weight: 400; }
    </style>
  </head>
  <body>
    <div class="sky"><i class="a1"></i><i class="a2"></i><i class="a3"></i><i class="a4"></i><i class="hue"></i></div>
    <div class="stars"><i></i><i></i><i></i><i></i><i></i></div>

    <header class="topbar">
      <div class="brandline"><span class="brand-dot"></span><span>FocusLink</span></div>
      <nav class="topnav">
        <button class="active">专注</button>
        <button>任务</button>
        <button>统计</button>
        <button>设置</button>
      </nav>
    </header>

    <main class="stage">
      <span class="task-pill">当前任务 · 未选择任务&ensp;<b>关联</b></span>
      <span class="rec"><i></i>FOCUS · 01 — REC</span>
      <div class="digits-wrap">
        <div class="digits" data-t>12:47</div>
        <div class="digits-glow" aria-hidden="true">12:47</div>
      </div>
      <div class="meta">开始于 <em>11:26</em> · 已持续 12 分 47 秒</div>
      <div class="track"></div>
    </main>

    <footer class="dock">
      <button class="btn-pause">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor"><path d="M8 5h3v14H8zM13.5 5H17v14h-3.5z"/></svg>
        暂停专注
      </button>
      <button class="btn-ghost">结束</button>
      <span class="divider"></span>
      <span class="stats">累计 <b>2:41:18</b> · 暂停 <b>0:18</b> · 总历时 <b>3:05:02</b></span>
    </footer>

    <script>
      let s = 12 * 60 + 47;
      const el = document.querySelector('[data-t]');
      const glow = document.querySelector('.digits-glow');
      setInterval(() => {
        s++;
        const m = String(Math.floor(s / 60)).padStart(2, '0');
        const ss = String(s % 60).padStart(2, '0');
        el.textContent = `${m}:${ss}`;
        if (glow) glow.textContent = `${m}:${ss}`;
        el.classList.remove('tick');
        void el.offsetWidth;
        el.classList.add('tick');
      }, 1000);
    </script>
  </body>
</html>
