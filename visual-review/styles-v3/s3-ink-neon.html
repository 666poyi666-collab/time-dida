<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>风格三 · 墨 Ink &amp; Neon</title>
    <style>
      @font-face {
        font-family: 'Geist';
        src: url('../mock-v2/fonts/geist-latin-wght-normal.woff2') format('woff2');
        font-weight: 100 900;
      }
      @font-face {
        font-family: 'JetBrains Mono';
        src: url('../mock-v2/fonts/jetbrains-mono-latin-400-normal.woff2') format('woff2');
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; height: 100%; overflow: hidden; }

      body {
        display: flex; flex-direction: column;
        color: #d7e3ee;
        background: #050507;
        font-family: 'Geist', 'Microsoft YaHei UI', sans-serif;
        user-select: none;
        -webkit-font-smoothing: antialiased;
      }

      .mono { font-family: 'JetBrains Mono', monospace; }

      /* ── 网格 + 扫描线 ── */
      .grid-bg {
        position: absolute; inset: 0; pointer-events: none;
        background-image:
          linear-gradient(90deg, rgb(34 211 238 / 0.045) 1px, transparent 1px),
          linear-gradient(180deg, rgb(34 211 238 / 0.045) 1px, transparent 1px);
        background-size: 64px 64px;
        mask-image: radial-gradient(120% 90% at 50% 40%, #000 30%, transparent 78%);
      }
      .scanline {
        position: absolute; left: 0; right: 0; top: -2px;
        height: 2px;
        background: linear-gradient(90deg, transparent, rgb(34 211 238 / 0.5) 50%, transparent);
        box-shadow: 0 0 18px rgb(34 211 238 / 0.4);
        animation: scan 7s linear infinite;
        pointer-events: none;
      }
      @keyframes scan {
        0% { top: -2px; opacity: 0; }
        8% { opacity: 1; }
        86% { opacity: 1; }
        100% { top: 100%; opacity: 0; }
      }
      .vignette {
        position: absolute; inset: 0; pointer-events: none;
        background: radial-gradient(130% 110% at 50% 42%, transparent 52%, rgb(0 0 0 / 0.55));
      }

      /* ── 控制台顶栏 ── */
      .console {
        position: relative; z-index: 5;
        display: flex; align-items: center; justify-content: space-between;
        padding: 16px 26px 14px;
        border-bottom: 1px solid rgb(34 211 238 / 0.22);
      }
      .console .id {
        display: flex; align-items: center; gap: 12px;
        font: 400 12px 'JetBrains Mono', monospace;
        letter-spacing: 0.14em;
        color: #7d8ea0;
      }
      .console .id b { color: #22d3ee; font-weight: 400; text-shadow: 0 0 12px rgb(34 211 238 / 0.6); }
      .rec { display: inline-flex; align-items: center; gap: 7px; color: #ff3b47; }
      .rec i {
        width: 8px; height: 8px; border-radius: 50%;
        background: #ff3b47;
        box-shadow: 0 0 10px #ff3b47;
        animation: blink 1.3s steps(2, jump-none) infinite;
      }
      @keyframes blink { 50% { opacity: 0.15; } }
      .cnav { display: flex; gap: 2px; }
      .cnav button {
        border: 0;
        border-bottom: 1px solid transparent;
        padding: 6px 12px;
        color: #66788c;
        background: transparent;
        font: 400 11.5px 'JetBrains Mono', monospace;
        letter-spacing: 0.1em;
        cursor: pointer;
        transition: all 0.18s;
      }
      .cnav button:hover { color: #d7e3ee; }
      .cnav button.active {
        color: #22d3ee;
        border-bottom-color: #22d3ee;
        text-shadow: 0 0 10px rgb(34 211 238 / 0.7);
        box-shadow: 0 8px 14px -10px rgb(34 211 238 / 0.5);
      }

      /* ── 主区 ── */
      .deck {
        position: relative; z-index: 4;
        flex: 1;
        display: grid;
        grid-template-columns: 230px 1fr;
        min-height: 0;
      }
      .side {
        display: flex; flex-direction: column; justify-content: center; gap: 18px;
        padding: 0 0 0 26px;
        border-right: 1px solid rgb(34 211 238 / 0.14);
      }
      .kv { font: 400 11px 'JetBrains Mono', monospace; letter-spacing: 0.06em; }
      .kv span { display: block; color: #4d5f72; margin-bottom: 4px; }
      .kv b { color: #9fb4c8; font-weight: 400; font-variant-numeric: tabular-nums; }
      .kv b.cy { color: #22d3ee; }
      .kv b.rd { color: #ff3b47; }
      .kv b.lm { color: #a3e635; }

      .core {
        position: relative;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
      }
      .core .brackets { position: absolute; inset: 12% 9%; pointer-events: none; }
      .core .brackets i { position: absolute; width: 22px; height: 22px; border: 1px solid rgb(34 211 238 / 0.4); }
      .core .brackets i:nth-child(1) { top: 0; left: 0; border-right: 0; border-bottom: 0; }
      .core .brackets i:nth-child(2) { top: 0; right: 0; border-left: 0; border-bottom: 0; }
      .core .brackets i:nth-child(3) { bottom: 0; left: 0; border-right: 0; border-top: 0; }
      .core .brackets i:nth-child(4) { bottom: 0; right: 0; border-left: 0; border-top: 0; }

      .task {
        font: 400 11.5px 'JetBrains Mono', monospace;
        letter-spacing: 0.08em;
        color: #66788c;
        margin-bottom: 22px;
      }
      .task b { color: #a3e635; font-weight: 400; cursor: pointer; text-shadow: 0 0 10px rgb(163 230 53 / 0.5); }

      .digits {
        font-size: 218px;
        font-weight: 290;
        letter-spacing: -0.03em;
        line-height: 0.9;
        color: #eaf7ff;
        font-variant-numeric: tabular-nums;
        text-shadow:
          0 0 34px rgb(34 211 238 / 0.35),
          2.5px 0 0 rgb(34 211 238 / 0.22),
          -2.5px 0 0 rgb(244 114 182 / 0.18);
      }
      .digits.tick { animation: glitch 0.09s steps(2) 1; }
      @keyframes glitch {
        0% { transform: translateX(1px); opacity: 0.82; }
        100% { transform: translateX(0); opacity: 1; }
      }

      .track {
        width: 440px; height: 2px;
        margin-top: 34px;
        background: repeating-linear-gradient(90deg, rgb(34 211 238 / 0.55) 0 6px, transparent 6px 10px);
        mask-image: linear-gradient(90deg, #000 58%, rgb(0 0 0 / 0.25) 58%);
      }

      .controls { display: flex; align-items: center; gap: 16px; margin-top: 40px; }
      .btn-pause {
        position: relative;
        min-height: 48px; padding: 0 30px;
        border: 1px solid rgb(255 59 71 / 0.75);
        border-radius: 3px;
        color: #ff5b66;
        background: rgb(255 59 71 / 0.07);
        box-shadow:
          0 0 22px -4px rgb(255 59 71 / 0.55),
          inset 0 0 14px rgb(255 59 71 / 0.12);
        font: 400 13px 'JetBrains Mono', monospace;
        letter-spacing: 0.12em;
        cursor: pointer;
        transition: all 0.18s;
      }
      .btn-pause:hover {
        color: #050507;
        background: #ff3b47;
        box-shadow: 0 0 34px -2px rgb(255 59 71 / 0.8);
      }
      .btn-end {
        min-height: 48px; padding: 0 16px;
        border: 0;
        color: #66788c;
        background: transparent;
        font: 400 12px 'JetBrains Mono', monospace;
        letter-spacing: 0.12em;
        cursor: pointer;
      }
      .btn-end:hover { color: #d7e3ee; }

      /* ── 底部 ticker ── */
      .ticker {
        position: relative; z-index: 5;
        overflow: hidden;
        border-top: 1px solid rgb(34 211 238 / 0.22);
        padding: 10px 0;
      }
      .ticker .lane {
        display: inline-flex; gap: 56px;
        white-space: nowrap;
        font: 400 11px 'JetBrains Mono', monospace;
        letter-spacing: 0.08em;
        color: #66788c;
        animation: tick 22s linear infinite;
      }
      .ticker b { color: #9fb4c8; font-weight: 400; font-variant-numeric: tabular-nums; }
      .ticker .cy { color: #22d3ee; }
      .ticker .rd { color: #ff3b47; }
      @keyframes tick { to { transform: translateX(-50%); } }
    </style>
  </head>
  <body>
    <div class="grid-bg"></div>
    <div class="scanline"></div>
    <div class="vignette"></div>

    <header class="console">
      <div class="id"><b>FOCUSLINK/01</b><span class="rec"><i></i>REC</span><span>开始于 11:26</span></div>
      <nav class="cnav">
        <button class="active">[FOC] 专注</button>
        <button>[TSK] 任务</button>
        <button>[STA] 统计</button>
        <button>[SET] 设置</button>
      </nav>
    </header>

    <main class="deck">
      <aside class="side mono">
        <div class="kv"><span>SEGMENT</span><b class="cy">01 / ACTIVE</b></div>
        <div class="kv"><span>ELAPSED</span><b>12:47</b></div>
        <div class="kv"><span>FOCUS·TOT</span><b class="lm">2:41:18</b></div>
        <div class="kv"><span>PAUSE·TOT</span><b class="rd">0:18:44</b></div>
        <div class="kv"><span>CONTINUITY</span><b>96%</b></div>
      </aside>

      <section class="core">
        <div class="brackets"><i></i><i></i><i></i><i></i></div>
        <div class="task">TASK :: 未选择任务&ensp;<b>[关联]</b></div>
        <div class="digits" data-t>12:47</div>
        <div class="track"></div>
        <div class="controls">
          <button class="btn-pause">▮▮ 暂停专注</button>
          <button class="btn-end">[ 结束 ]</button>
        </div>
      </section>
    </main>

    <footer class="ticker">
      <div class="lane">
        <span>FOCUS 2:41:18</span><span>PAUSE <b class="rd">0:18:44</b></span><span>WALL 3:05:02</span><span class="cy">REC 12:47</span><span>SEG 01</span><span>CONTINUITY 96%</span>
        <span>FOCUS 2:41:18</span><span>PAUSE <b class="rd">0:18:44</b></span><span>WALL 3:05:02</span><span class="cy">REC 12:47</span><span>SEG 01</span><span>CONTINUITY 96%</span>
      </div>
    </footer>

    <script>
      let s = 12 * 60 + 47;
      const el = document.querySelector('[data-t]');
      setInterval(() => {
        s++;
        const m = String(Math.floor(s / 60)).padStart(2, '0');
        const ss = String(s % 60).padStart(2, '0');
        el.textContent = `${m}:${ss}`;
        el.classList.remove('tick');
        void el.offsetWidth;
        el.classList.add('tick');
      }, 1000);
    </script>
  </body>
</html>
