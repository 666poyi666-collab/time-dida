<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>FocusLink v2 · C 居中天光</title>
    <link rel="stylesheet" href="mock-shared.css" />
    <style>
      .sky {
        position: relative;
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
        overflow: hidden;
      }

      .taskline {
        position: relative;
        z-index: 2;
        display: flex;
        justify-content: center;
        padding-top: 26px;
      }

      .center {
        position: relative;
        z-index: 2;
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding-bottom: 30px;
      }

      .center .eyebrow {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .center .eyebrow i {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: rgb(var(--success));
        box-shadow: 0 0 10px rgb(var(--success) / 0.7);
      }

      .digits-wrap {
        position: relative;
        margin-top: 10px;
      }

      .aurora {
        position: absolute;
        top: 50%;
        left: 50%;
        z-index: -1;
        width: 880px;
        height: 430px;
        background: radial-gradient(
          closest-side,
          rgb(var(--accent) / 0.22),
          rgb(var(--mint) / 0.1) 52%,
          transparent 74%
        );
        filter: blur(18px);
        transform: translate(-50%, -52%);
      }

      .digits {
        color: rgb(13 18 29);
        font-size: 204px;
        font-weight: 600;
        letter-spacing: -0.044em;
        line-height: 0.9;
        font-variant-numeric: tabular-nums;
      }

      .horizon {
        width: 620px;
        height: 1px;
        margin: 22px auto 0;
        background: linear-gradient(
          90deg,
          transparent,
          rgb(var(--success) / 0.6) 30%,
          rgb(var(--accent) / 0.5) 70%,
          transparent
        );
        box-shadow: 0 0 14px rgb(var(--success) / 0.3);
      }

      .meta {
        margin-top: 14px;
        color: rgb(var(--muted));
        font-size: 12px;
        letter-spacing: 0.06em;
      }

      .meta em {
        color: rgb(var(--success));
        font-style: normal;
      }

      .controls {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-top: 32px;
      }

      .controls .btn-primary {
        min-height: 54px;
        padding: 0 34px;
        border-radius: 999px;
        font-size: 14.5px;
      }

      .controls .btn-ghost {
        min-height: 54px;
        border-radius: 999px;
      }

      .strip {
        position: relative;
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 26px;
        padding: 13px 40px 16px;
        border-top: 1px solid rgb(var(--border) / 0.55);
        color: rgb(var(--subtle));
        font-size: 11px;
        letter-spacing: 0.03em;
        font-variant-numeric: tabular-nums;
      }

      .strip b {
        color: rgb(var(--text));
        font-weight: 500;
      }

      .strip .sep {
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: rgb(var(--border-strong));
      }
    </style>
  </head>
  <body>
    <aside class="rail">
      <div class="brand">
        <span class="brand-mark">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6.6 12a5.4 5.4 0 0 1 9.62-3.36" stroke-width="1.8" opacity="0.6" />
            <path d="M17.4 12a5.4 5.4 0 0 1-9.62 3.36" stroke-width="2.2" />
            <path d="M9.3 12h5.4" stroke-width="1.7" opacity="0.9" />
            <circle cx="17.65" cy="6.35" r="1.35" fill="currentColor" stroke="none" />
          </svg>
        </span>
        <span class="brand-word">Focus<em>Link</em></span>
      </div>
      <nav class="nav">
        <button class="active">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <circle cx="12" cy="12" r="8.2" />
            <circle cx="12" cy="12" r="3.4" />
          </svg>
          <span>专注</span>
        </button>
        <button>
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9.5 6h10M9.5 12h10M9.5 18h10" />
            <path d="M4 6.2l1.3 1.3L7.6 5.2M4 12.2l1.3 1.3 2.3-2.3M4 18.2l1.3 1.3 2.3-2.3" />
          </svg>
          <span>任务</span>
        </button>
        <button>
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M6 19v-6M11 19V6M16 19v-3M21 19v-9" />
          </svg>
          <span>统计</span>
        </button>
        <button>
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M4.5 8h8M18.5 8h1M4.5 16h3M13.5 16h6" />
            <circle cx="15.5" cy="8" r="2.1" />
            <circle cx="10.5" cy="16" r="2.1" />
          </svg>
          <span>设置</span>
        </button>
      </nav>
      <div class="state-capsule">
        <i></i>
        专注中
        <time>12:47</time>
      </div>
    </aside>

    <main class="sky">
      <div class="ambient">
        <span class="glow glow-a"></span>
        <span class="glow glow-b"></span>
        <span class="glow glow-state"></span>
        <span class="grain"></span>
      </div>

      <div class="taskline">
        <span class="chip">当前任务 · 未选择任务&ensp;<b style="color: rgb(var(--accent))">关联</b></span>
      </div>

      <div class="center">
        <span class="eyebrow"><i></i>FOCUS 01 · 正在记录专注</span>
        <div class="digits-wrap">
          <span class="aurora"></span>
          <div class="digits">12:47</div>
        </div>
        <div class="horizon"></div>
        <div class="meta mono">开始于 <em>11:26</em> · 已持续 12 分 47 秒</div>
        <div class="controls">
          <button class="btn-primary btn-pause">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M8 5h3v14H8zM13.5 5H17v14h-3.5z"/></svg>
            暂停专注
          </button>
          <button class="btn-ghost">结束</button>
        </div>
      </div>

      <footer class="strip mono">
        <span>累计专注 <b>2:41:18</b></span>
        <span class="sep"></span>
        <span>累计暂停 <b style="color: rgb(var(--pause))">0:18:44</b></span>
        <span class="sep"></span>
        <span>总历时 <b>3:05:02</b></span>
        <span class="sep"></span>
        <span>连续性 <b>96%</b></span>
      </footer>
    </main>
  </body>
</html>
