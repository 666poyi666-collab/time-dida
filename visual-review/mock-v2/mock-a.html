<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>FocusLink v2 · A 全幅英雄</title>
    <link rel="stylesheet" href="mock-shared.css" />
    <style>
      .stage {
        position: relative;
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
        overflow: hidden;
      }

      .topbar {
        position: relative;
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 30px 40px 0;
      }

      .topbar .left {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .hero {
        position: relative;
        z-index: 2;
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 0 340px 0 56px;
      }

      .hero .meta {
        margin-bottom: 6px;
        color: rgb(var(--muted));
        font-size: 12px;
        letter-spacing: 0.06em;
      }

      .hero .meta em {
        color: rgb(var(--success));
        font-style: normal;
      }

      .digits {
        color: rgb(13 18 29);
        font-size: 188px;
        font-weight: 600;
        letter-spacing: -0.042em;
        line-height: 0.92;
        font-variant-numeric: tabular-nums;
      }

      .track {
        position: relative;
        width: min(620px, 100%);
        height: 4px;
        margin-top: 30px;
        border-radius: 99px;
        background: rgb(var(--border) / 0.5);
      }

      .track::before {
        content: '';
        position: absolute;
        inset: 0 auto 0 0;
        width: 58%;
        border-radius: inherit;
        background: linear-gradient(90deg, rgb(var(--success)), rgb(var(--mint) / 0.35));
        box-shadow: 0 0 16px rgb(var(--success) / 0.45);
      }

      .track i {
        position: absolute;
        top: 50%;
        left: calc(58% - 3px);
        width: 7px;
        height: 7px;
        margin-top: -3.5px;
        border-radius: 50%;
        background: rgb(var(--success));
        box-shadow:
          0 0 0 5px rgb(var(--success) / 0.15),
          0 0 14px rgb(var(--success) / 0.6);
      }

      .dock {
        position: relative;
        z-index: 3;
        display: flex;
        justify-content: center;
        padding: 0 40px 34px;
      }

      .cmd {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        border: 1px solid rgb(var(--border) / 0.65);
        border-radius: 20px;
        background: rgb(var(--elevated) / 0.86);
        box-shadow:
          0 24px 60px -30px rgb(23 32 54 / 0.35),
          0 2px 8px rgb(23 32 54 / 0.05);
      }

      .cmd .divider {
        width: 1px;
        height: 22px;
        background: rgb(var(--border) / 0.8);
      }

      .cmd .stats {
        padding: 0 8px;
        color: rgb(var(--subtle));
        font-size: 11px;
        letter-spacing: 0.02em;
        font-variant-numeric: tabular-nums;
      }

      .cmd .stats b {
        color: rgb(var(--text));
        font-weight: 500;
      }

      .ledger {
        position: absolute;
        z-index: 4;
        top: 86px;
        right: 22px;
        bottom: 104px;
        width: 286px;
        padding: 16px 16px 14px;
        border: 1px solid rgb(var(--border) / 0.55);
        border-radius: 18px;
        background: rgb(var(--elevated) / 0.68);
        box-shadow: 0 18px 44px -26px rgb(23 32 54 / 0.3);
      }

      .ledger h4 {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-bottom: 10px;
        border-bottom: 1px solid rgb(var(--border) / 0.5);
      }

      .ledger h4 span {
        color: rgb(var(--subtle));
        font-size: 10px;
      }

      .seg {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 11px 2px;
        border-bottom: 1px solid rgb(var(--border) / 0.4);
      }

      .seg .node {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: rgb(var(--success));
        box-shadow: 0 0 8px rgb(var(--success) / 0.5);
      }

      .seg .t {
        flex: 1;
        min-width: 0;
      }

      .seg .t b {
        display: block;
        font-size: 12px;
        font-weight: 550;
      }

      .seg .t small {
        color: rgb(var(--subtle));
        font-size: 10.5px;
      }

      .seg .d {
        font-variant-numeric: tabular-nums;
        font-size: 12.5px;
        font-weight: 560;
      }

      .seg .tag {
        color: rgb(var(--subtle));
        font-size: 10px;
      }

      .ledger .continuity {
        margin-top: auto;
        padding-top: 12px;
      }

      .ledger .continuity .row {
        display: flex;
        justify-content: space-between;
        color: rgb(var(--subtle));
        font-size: 10.5px;
      }

      .ledger .continuity .bar {
        height: 3px;
        margin-top: 7px;
        border-radius: 99px;
        background: rgb(var(--border) / 0.45);
      }

      .ledger .continuity .bar i {
        display: block;
        width: 96%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, rgb(var(--success)), rgb(var(--accent)));
        box-shadow: 0 0 10px rgb(var(--success) / 0.4);
      }

      .ledger .continuity strong {
        color: rgb(var(--text));
        font-variant-numeric: tabular-nums;
      }
    </style>
  </head>
  <body>
    <aside class="rail">
      <div class="brand">
        <span class="brand-mark">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6.6 12a5.4 5.4 0 0 1 9.62-3.36" stroke-width="1.8" opacity="0.6" />
            <path d="M17.4 12a5.4 5.4 0 0 1-9.62 3.36" stroke-width="2.2" />
            <path d="M9.3 12h5.4" stroke-width="1.7" opacity="0.9" />
            <circle cx="17.65" cy="6.35" r="1.35" fill="currentColor" stroke="none" />
          </svg>
        </span>
        <span class="brand-word">Focus<em>Link</em></span>
      </div>
      <nav class="nav">
        <button class="active">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <circle cx="12" cy="12" r="8.2" />
            <circle cx="12" cy="12" r="3.4" />
          </svg>
          <span>专注</span>
        </button>
        <button>
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9.5 6h10M9.5 12h10M9.5 18h10" />
            <path d="M4 6.2l1.3 1.3L7.6 5.2M4 12.2l1.3 1.3 2.3-2.3M4 18.2l1.3 1.3 2.3-2.3" />
          </svg>
          <span>任务</span>
        </button>
        <button>
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M6 19v-6M11 19V6M16 19v-3M21 19v-9" />
          </svg>
          <span>统计</span>
        </button>
        <button>
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M4.5 8h8M18.5 8h1M4.5 16h3M13.5 16h6" />
            <circle cx="15.5" cy="8" r="2.1" />
            <circle cx="10.5" cy="16" r="2.1" />
          </svg>
          <span>设置</span>
        </button>
      </nav>
      <div class="state-capsule">
        <i></i>
        专注中
        <time>12:47</time>
      </div>
    </aside>

    <main class="stage">
      <div class="ambient">
        <span class="glow glow-a"></span>
        <span class="glow glow-b"></span>
        <span class="glow glow-state"></span>
        <span class="grain"></span>
      </div>

      <header class="topbar">
        <div class="left">
          <span class="chip success"><i></i>专注中</span>
          <span class="eyebrow">FOCUS 01 · 正在记录</span>
        </div>
        <span class="chip">当前任务 · 未选择任务&ensp;<b style="color: rgb(var(--accent))">关联</b></span>
      </header>

      <section class="hero">
        <div class="meta mono">开始于 <em>11:26</em> · 已持续 12 分 47 秒</div>
        <div class="digits">12:47</div>
        <div class="track"><i></i></div>
      </section>

      <footer class="dock">
        <div class="cmd">
          <button class="btn-primary btn-pause">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor"><path d="M8 5h3v14H8zM13.5 5H17v14h-3.5z"/></svg>
            暂停专注
          </button>
          <button class="btn-ghost">
            <svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor"><rect x="6.5" y="6.5" width="11" height="11" rx="2"/></svg>
            结束
          </button>
          <span class="divider"></span>
          <span class="stats mono">累计专注 <b>2:41:18</b> · 暂停 <b>0:18</b> · 总历时 <b>3:05:02</b></span>
        </div>
      </footer>

      <aside class="ledger">
        <h4 class="eyebrow">本次片段<span>2 条</span></h4>
        <div class="seg">
          <span class="node"></span>
          <div class="t"><b>专注片段 1</b><small>11:26 · 进行中</small></div>
          <span class="d">12:47</span>
          <span class="tag">未关联</span>
        </div>
        <div class="seg">
          <span class="node" style="background: rgb(var(--pause)); box-shadow: 0 0 8px rgb(var(--pause) / 0.5)"></span>
          <div class="t"><b>暂停片段 1</b><small>11:39 — 11:41</small></div>
          <span class="d" style="color: rgb(var(--pause))">1:32</span>
          <span class="tag"></span>
        </div>
        <div class="continuity">
          <div class="row"><span>本轮连续性</span><strong>96%</strong></div>
          <div class="bar"><i></i></div>
        </div>
      </aside>
    </main>
  </body>
</html>
