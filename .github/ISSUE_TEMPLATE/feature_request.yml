name: 功能请求
description: 为 FocusLink 提出新功能或行为改进建议
title: "[FEAT] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        请先确认该功能不会破坏以下不可变契约：
        - Timer 状态机（idle→running→paused→running→finished）
        - SQLite schema（见 electron/db/schema.sql）
        - dida CLI Provider 的对外接口
        - 全局快捷键 Ctrl+Alt+ 修饰键规则
        - 现有 IPC 通道契约（见 backend-design/BACKEND_SPEC.md）

  - type: textarea
    id: problem
    attributes:
      label: 要解决的实际问题
      description: 你在什么场景下感到不便？
      placeholder: "完成专注后想把这段时间同时关联到两个任务，目前只能关联一个。"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 你希望 FocusLink 怎么做？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
      description: 有没有绕过办法或其它实现思路？
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: 涉及模块
      options:
        - 计时器 / 状态机
        - 任务面板 / dida CLI
        - 小窗（Mini Window）
        - 历史记录 / 统计
        - 设置 / 主题 / 快捷键
        - 同步 / 数据导出
        - 打包 / 安装
        - 其它
    validations:
      required: true

  - type: checkboxes
    id: contracts
    attributes:
      label: 契约确认
      options:
        - label: 我已阅读 frontend-design/FRONTEND_SPEC.md 与 backend-design/BACKEND_SPEC.md
          required: true
        - label: 如需修改核心契约，我已说明迁移、兼容与验证要求
          required: true
